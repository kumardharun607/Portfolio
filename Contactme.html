
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-amber-200 min-h-screen">

    <!-- Navigation -->
    <nav class="px-4 sm:px-6 lg:px-8 pt-6">

        <a href="./index.html">

            <button
                class="flex items-center gap-2
                       bg-amber-900
                       text-amber-200
                       px-5 py-3
                       rounded-xl
                       font-semibold
                       shadow-lg
                       transition-all duration-300
                       hover:scale-105">

                <i class="bi bi-box-arrow-in-left text-xl"></i>
                Go Back

            </button>

        </a>

    </nav>

    <!-- Main Container -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Heading -->
        <h1
            class="text-3xl sm:text-4xl md:text-5xl
                   font-bold
                   text-amber-900
                   mb-6">

            Contact Me

        </h1>

        <div class="w-full h-[2px] bg-amber-900 mb-10"></div>

        <!-- Contact Form -->
        <div class="flex justify-center">

            <div
                class="w-full max-w-3xl
                       bg-white/10
                       backdrop-blur-xl
                       border border-white/20
                       rounded-2xl
                       shadow-2xl
                       p-6 sm:p-8 md:p-10">

                <form
                    action="./Formsubmit.html"
                    method="GET"
                    class="space-y-6">

                    <!-- Name -->
                    <div>

                        <label
                            for="name"
                            class="block mb-2 text-amber-900 font-semibold">

                            Name

                        </label>

                        <input
                            required
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Enter your name"

                            class="w-full
                                   p-3
                                   rounded-lg
                                   outline-none
                                   border border-amber-300
                                   focus:ring-2
                                   focus:ring-orange-500">

                    </div>

                    <!-- Email -->
                    <div>

                        <label
                            for="email"
                            class="block mb-2 text-amber-900 font-semibold">

                            Email

                        </label>

                        <input
                            required
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your email"

                            class="w-full
                                   p-3
                                   rounded-lg
                                   outline-none
                                   border border-amber-300
                                   focus:ring-2
                                   focus:ring-orange-500">

                    </div>

                    <!-- Message -->
                    <div>

                        <label
                            for="msg"
                            class="block mb-2 text-amber-900 font-semibold">

                            Message

                        </label>

                        <textarea
                            required
                            id="msg"
                            name="msg"
                            rows="6"
                            placeholder="Write your message..."

                            class="w-full
                                   p-3
                                   rounded-lg
                                   outline-none
                                   border border-amber-300
                                   resize-none
                                   focus:ring-2
                                   focus:ring-orange-500"></textarea>

                    </div>

                    <!-- Submit -->
                    <button
                        type="submit"

                        class="bg-amber-900
                               text-amber-200
                               px-8 py-3
                               rounded-lg
                               font-bold
                               shadow-lg
                               transition-all duration-300
                               hover:bg-orange-700
                               hover:scale-105">

                        Submit

                    </button>

                </form>

            </div>

        </div>

        <!-- Social Links -->
        <div class="flex justify-center mt-10">

            <ul class="flex items-center gap-8">

                <li>

                    <a href="mailto:kumardharun607@gmail.com">

                        <i
                            class="bi bi-envelope-fill
                                   text-4xl
                                   text-amber-900
                                   transition-all duration-300
                                   hover:text-orange-600
                                   hover:scale-110"></i>

                    </a>

                </li>

                <li>

                    <a
                        href="https://wa.me/916379888340"
                        target="_blank">

                        <i
                            class="bi bi-telephone-fill
                                   text-3xl
                                   text-amber-900
                                   transition-all duration-300
                                   hover:text-orange-600
                                   hover:scale-110"></i>

                    </a>

                </li>

                <li>

                    <a
                        href="https://www.linkedin.com/in/techdharunkumar/"
                        target="_blank">

                        <i
                            class="bi bi-linkedin
                                   text-3xl
                                   text-amber-900
                                   transition-all duration-300
                                   hover:text-orange-600
                                   hover:scale-110"></i>

                    </a>

                </li>

            </ul>

        </div>

    </main>

</body>
</html>
